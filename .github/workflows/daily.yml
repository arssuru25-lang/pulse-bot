name: Daily Pulse

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  pulse:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install -r requirements.txt

      - name: Run bot
        run: python bot.py
      - name: Run news summary
        run: python news.py
